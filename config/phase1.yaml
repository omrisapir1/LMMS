# ============================
# Phase 1 Configuration
# ============================
# Purpose:
# Bootstrap latent Markov reasoning using z-tokens and PPO
# on very easy math questions, with strong environment scaffolding.
#
# This phase prioritizes:
# - protocol learning
# - latent step usage
# - deferred answering
# NOT raw math performance.

phase: 1

# ----------------------------
# Dataset
# ----------------------------
dataset:
  name: omrisap/gsm8k

  # Use only training split
  split: train

  # Filter conditions for Phase 1
  filters:
    is_correct_by_qwen_small: true
    length_ans_max: 3

# ----------------------------
# Model
# ----------------------------
model:
  base_model: Qwen/Qwen2.5-Math-1.5B-Instruct

  # Latent action (z-token) configuration
  z_tokens:
    vocab_size: 64
    prefix: "<z>"

  # Special control tokens
  special_tokens:
    answer_token: "</answer>"

# ----------------------------
# Environment (Protocol)
# ----------------------------
environment:
  # Latent reasoning steps
  latent_steps:
    mode: random
    min: 3
    max: 7

  # Answer formatting
  answer:
    total_width: 5                # fixed-width numeric answer
    padding:
      mode: environment            # environment inserts leading zeros
    emit_answer_token:
      mode: environment            # </answer> is inserted by environment

  # Action masking rules
  action_space:
    latent_phase:
      allowed_tokens: z_tokens     # only <z*> tokens allowed
    answer_phase:
      allowed_tokens: digits       # only 0–9 tokens allowed


rollout:
  latent:
    strategy: sample
    temperature: 1.0
  answer:
    strategy: greedy

# ----------------------------
# PPO Training
# ----------------------------
ppo:
  algorithm: PPO

  # Learning rates
  learning_rate:
    policy: 1e-5
    value: 1e-5

  # PPO clipping
  clip_epsilon: 0.2

  # Entropy bonus (important for exploration of z-tokens)
  entropy_coefficient: 0.02

  # KL penalty (disabled in Phase 1)
  kl_penalty:
    enabled: false

  # Advantage computation
  advantage:
    method: simple               # no GAE in Phase 1
    normalize: true

  # Optimization details
  optimizer:
    type: adamw
    weight_decay: 0.01
    max_grad_norm: 1.0



logging:
  log_episodes: true
  log_every_n_in_batch: 8
# ----------------------------
# Training Schedule
# ----------------------------
training:
  batch_size: 32
  rollout_batch_size: 32          # number of episodes per PPO update
  updates_per_epoch: 1
  num_epochs: 5                   # keep small for Phase 1 experimentation

  # Mixed precision / performance
  precision: bf16
  gradient_checkpointing: true

# ----------------------------
# Trainable Parameters
# ----------------------------
trainable:
  # Token embeddings
  embeddings:
    train_z_tokens_only: true     # only <z*> embeddings are trainable

  # Transformer layers
  transformer:
    train_top_fraction: 0.25      # top ~25% layers are trainable

  # Heads
  heads:
    lm_head: true
    value_head: true
